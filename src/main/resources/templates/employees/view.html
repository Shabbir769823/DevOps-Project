<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Details - DevOps Employee Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3 mb-5">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" th:href="@{/dashboard}">
                <i class="bi bi-cpu text-primary fs-3 me-2"></i>
                <span class="fw-bold">DevOps<span>Portal</span></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-1"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/employees}"><i class="bi bi-people me-1"></i> Employees</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/tasks}"><i class="bi bi-card-checklist me-1"></i> Tasks</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/profile}"><i class="bi bi-person-circle me-1"></i> Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/chat}"><i class="bi bi-chat-dots me-1"></i> Messages <span id="chat-badge" class="badge bg-danger rounded-pill d-none">0</span></a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/notifications}">
                            <i class="bi bi-bell-fill me-1"></i> Notifications 
                            <span th:if="${unreadNotificationCount > 0}" class="badge bg-danger rounded-pill" th:text="${unreadNotificationCount}">0</span>
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center text-secondary">
                    <span class="me-3" sec:authorize="isAuthenticated()">
                        Welcome, <strong class="text-white" sec:authentication="name">User</strong>
                        <span class="badge badge-admin ms-1" sec:authorize="hasRole('ADMIN')">Admin</span>
                        <span class="badge badge-user ms-1" sec:authorize="!hasRole('ADMIN')">User</span>
                    </span>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline-custom btn-sm"><i class="bi bi-box-arrow-right me-1"></i> Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="glass-card p-5">
                    <div class="d-flex align-items-center justify-content-between mb-4 border-bottom border-secondary border-opacity-10 pb-3">
                        <div>
                            <h2 class="fw-bold mb-1"><i class="bi bi-person-bounding-box text-primary me-2"></i>Employee Profile</h2>
                            <p class="text-secondary mb-0" th:text="${'File ID: #' + employee.id}">File ID: #1</p>
                        </div>
                        <a th:href="@{/employees/edit/{id}(id=${employee.id})}" class="btn btn-outline-custom btn-sm"><i class="bi bi-pencil me-1"></i> Edit</a>
                    </div>

                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="text-secondary fw-semibold d-block mb-1">First Name</label>
                            <div class="fs-5 fw-bold" th:text="${employee.firstName}">Amit</div>
                        </div>
                        <div class="col-md-6">
                            <label class="text-secondary fw-semibold d-block mb-1">Last Name</label>
                            <div class="fs-5 fw-bold" th:text="${employee.lastName}">Sharma</div>
                        </div>
                        <div class="col-md-6">
                            <label class="text-secondary fw-semibold d-block mb-1">Email Address</label>
                            <div class="fs-5 text-info" th:text="${employee.email}">amit.sharma@company.com</div>
                        </div>
                        <div class="col-md-6">
                            <label class="text-secondary fw-semibold d-block mb-1">Annual Salary</label>
                            <div class="fs-5 fw-bold text-success" th:text="${'$' + #numbers.formatDecimal(employee.salary, 1, 'COMMA', 2, 'POINT')}">$85,000.00</div>
                        </div>
                        <div class="col-md-6">
                            <label class="text-secondary fw-semibold d-block mb-1">Department</label>
                            <div class="fs-5" th:text="${employee.department}">Engineering</div>
                        </div>
                        <div class="col-md-6">
                            <label class="text-secondary fw-semibold d-block mb-1">Designation</label>
                            <div class="fs-5 text-white-50" th:text="${employee.designation}">Senior Developer</div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end">
                        <a th:href="@{/employees}" class="btn btn-primary-custom">Back to Directory</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}" src="/js/main.js"></script>
</body>
</html>
