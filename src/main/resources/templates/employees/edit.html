<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Employee - DevOps Employee Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3 mb-5">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" th:href="@{/dashboard}">
                <i class="bi bi-cpu text-primary fs-3 me-2"></i>
                <span class="fw-bold">DevOps<span>Portal</span></span>
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/employees}">Employees</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/profile}">Profile</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/chat}">Messages <span id="chat-badge" class="badge bg-danger rounded-pill d-none">0</span></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="glass-card p-5">
                    <div class="mb-4">
                        <h2 class="fw-bold"><i class="bi bi-pencil-square text-primary me-2"></i>Edit Employee</h2>
                        <p class="text-secondary">Modify fields to update employee records</p>
                    </div>

                    <!-- Alerts -->
                    <div th:if="${error}" class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger rounded-3 mb-4" role="alert" th:text="${error}">
                        An error occurred.
                    </div>

                    <form th:action="@{/employees/update/{id}(id=${employee.id})}" th:object="${employee}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="firstName" class="form-label text-secondary fw-semibold">First Name</label>
                                <input type="text" id="firstName" th:field="*{firstName}" class="form-control form-control-custom" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="lastName" class="form-label text-secondary fw-semibold">Last Name</label>
                                <input type="text" id="lastName" th:field="*{lastName}" class="form-control form-control-custom" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label text-secondary fw-semibold">Email Address</label>
                            <input type="email" id="email" th:field="*{email}" class="form-control form-control-custom" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="department" class="form-label text-secondary fw-semibold">Department</label>
                                <input type="text" id="department" th:field="*{department}" class="form-control form-control-custom" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="designation" class="form-label text-secondary fw-semibold">Designation</label>
                                <input type="text" id="designation" th:field="*{designation}" class="form-control form-control-custom" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="salary" class="form-label text-secondary fw-semibold">Annual Salary</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-secondary-subtle text-secondary" style="border: 1px solid var(--border-color);">$</span>
                                <input type="number" step="0.01" id="salary" th:field="*{salary}" class="form-control form-control-custom border-start-0 ps-0" required>
                            </div>
                        </div>

                        <div class="d-flex gap-3 justify-content-end">
                            <a th:href="@{/employees}" class="btn btn-outline-custom">Cancel</a>
                            <button type="submit" class="btn btn-primary-custom">Update Employee</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}" src="/js/main.js"></script>
</body>
</html>
