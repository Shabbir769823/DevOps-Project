<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DevOps Employee Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" href="/css/style.css" rel="stylesheet">
</head>
<body class="auth-bg d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="glass-card p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold"><i class="bi bi-cpu text-primary me-2"></i>DevOps<span>Portal</span></h2>
                        <p class="text-secondary">Automated Java Web App Deployments</p>
                    </div>

                    <!-- Alerts -->
                    <div th:if="${param.error}" class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger rounded-3" role="alert">
                        Invalid username or password.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success border-0 bg-success bg-opacity-10 text-success rounded-3" role="alert">
                        You have been logged out successfully.
                    </div>
                    <div th:if="${param.registerSuccess}" class="alert alert-success border-0 bg-success bg-opacity-10 text-success rounded-3" role="alert">
                        Registration successful! Please login.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label text-secondary fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-secondary-subtle text-secondary" style="border: 1px solid var(--border-color);"><i class="bi bi-person"></i></span>
                                <input type="text" id="username" name="username" class="form-control form-control-custom border-start-0 ps-0" placeholder="Enter username" required autofocus>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label text-secondary fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-secondary-subtle text-secondary" style="border: 1px solid var(--border-color);"><i class="bi bi-lock"></i></span>
                                <input type="password" id="password" name="password" class="form-control form-control-custom border-start-0 ps-0" placeholder="Enter password" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary-custom w-100 py-2 mb-3">Sign In</button>
                    </form>

                    <div class="text-center mt-3">
                        <p class="text-secondary mb-0">Don't have an account? <a th:href="@{/register}" class="text-primary text-decoration-none fw-semibold">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/main.js}" src="/js/main.js"></script>
</body>
</html>
