<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - DevOps Employee Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3 mb-5">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" th:href="@{/dashboard}">
                <i class="bi bi-cpu text-primary fs-3 me-2"></i>
                <span class="fw-bold">DevOps<span>Portal</span></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-1"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/employees}"><i class="bi bi-people me-1"></i> Employees</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/tasks}"><i class="bi bi-card-checklist me-1"></i> Tasks</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/profile}"><i class="bi bi-person-circle me-1"></i> Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/chat}"><i class="bi bi-chat-dots me-1"></i> Messages <span id="chat-badge" class="badge bg-danger rounded-pill d-none">0</span></a>
                    </li>
                    <li class="nav-item active" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link active" th:href="@{/notifications}">
                            <i class="bi bi-bell-fill me-1"></i> Notifications 
                            <span th:if="${unreadNotificationCount > 0}" class="badge bg-danger rounded-pill" th:text="${unreadNotificationCount}">0</span>
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center text-secondary">
                    <span class="me-3" sec:authorize="isAuthenticated()">
                        Welcome, <strong class="text-white" sec:authentication="name">User</strong>
                        <span class="badge badge-admin ms-1" sec:authorize="hasRole('ADMIN')">Admin</span>
                        <span class="badge badge-user ms-1" sec:authorize="!hasRole('ADMIN')">User</span>
                    </span>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline-custom btn-sm"><i class="bi bi-box-arrow-right me-1"></i> Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container pb-5">
        <!-- Header Actions -->
        <div class="row align-items-center g-3 mb-4">
            <div class="col-md-6">
                <h1 class="fw-bold mb-1"><i class="bi bi-bell text-primary me-2"></i>Notifications Inbox</h1>
                <p class="text-secondary">Track work completions and pipeline alerts</p>
            </div>
            <div class="col-md-6 text-md-end" th:if="${unreadNotificationCount > 0}">
                <form th:action="@{/notifications/read-all}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-custom btn-sm"><i class="bi bi-check2-all me-1"></i> Mark All as Read</button>
                </form>
            </div>
        </div>

        <!-- Notification List -->
        <div class="glass-card p-4">
            <div th:each="n : ${notifications}" class="notification-item d-flex justify-content-between align-items-center" th:classappend="${!n.readStatus ? 'unread' : ''}">
                <div class="d-flex align-items-center">
                    <div class="me-3">
                        <i class="bi fs-4" th:classappend="${!n.readStatus ? 'bi-envelope-exclamation-fill text-primary' : 'bi-envelope-open text-secondary'}"></i>
                    </div>
                    <div>
                        <div class="fw-semibold text-white mb-1" th:text="${n.message}">Employee John Doe completed task</div>
                        <div class="text-secondary small" th:text="${#temporals.format(n.createdAt, 'yyyy-MM-dd HH:mm:ss')}">2026-05-29 12:00:00</div>
                    </div>
                </div>
                <div>
                    <form th:if="${!n.readStatus}" th:action="@{/notifications/read/{id}(id=${n.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-custom" title="Mark as Read">
                            <i class="bi bi-check-lg"></i>
                        </button>
                    </form>
                    <span th:if="${n.readStatus}" class="text-secondary small"><i class="bi bi-check2-all"></i> Read</span>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(notifications)}" class="text-center py-5 text-secondary">
                <i class="bi bi-bell-slash fs-1 d-block mb-3"></i>
                No notifications found.
            </div>
        </div>
    </div>

    <!-- Bootstrap Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}" src="/js/main.js"></script>
</body>
</html>
