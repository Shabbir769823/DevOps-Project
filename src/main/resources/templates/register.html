<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DevOps Employee Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" href="/css/style.css" rel="stylesheet">
</head>
<body class="auth-bg d-flex align-items-center min-vh-100">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-card p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold"><i class="bi bi-person-plus text-primary me-2"></i>Create Account</h2>
                        <p class="text-secondary">Join the DevOps Employee Portal</p>
                    </div>

                    <!-- Alerts -->
                    <div th:if="${error}" class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger rounded-3" role="alert" th:text="${error}">
                        Registration error.
                    </div>

                    <form th:action="@{/register}" th:object="${user}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="firstName" class="form-label text-secondary fw-semibold">First Name</label>
                                <input type="text" id="firstName" th:field="*{firstName}" class="form-control form-control-custom" placeholder="John" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="lastName" class="form-label text-secondary fw-semibold">Last Name</label>
                                <input type="text" id="lastName" th:field="*{lastName}" class="form-control form-control-custom" placeholder="Doe" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label text-secondary fw-semibold">Username</label>
                            <input type="text" id="username" th:field="*{username}" class="form-control form-control-custom" placeholder="johndoe" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label text-secondary fw-semibold">Email Address</label>
                            <input type="email" id="email" th:field="*{email}" class="form-control form-control-custom" placeholder="john.doe@company.com" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label text-secondary fw-semibold">Password</label>
                            <input type="password" id="password" th:field="*{password}" class="form-control form-control-custom" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-primary-custom w-100 py-2 mb-3">Register</button>
                    </form>

                    <div class="text-center mt-3">
                        <p class="text-secondary mb-0">Already have an account? <a th:href="@{/login}" class="text-primary text-decoration-none fw-semibold">Sign In</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/main.js}" src="/js/main.js"></script>
</body>
</html>
