<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - DevOps Employee Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3 mb-5">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" th:href="@{/dashboard}">
                <i class="bi bi-cpu text-primary fs-3 me-2"></i>
                <span class="fw-bold">DevOps<span>Portal</span></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-1"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/employees}"><i class="bi bi-people me-1"></i> Employees</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/tasks}"><i class="bi bi-card-checklist me-1"></i> Tasks</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/chat}"><i class="bi bi-chat-dots me-1"></i> Messages <span id="chat-badge" class="badge bg-danger rounded-pill d-none">0</span></a>
                    </li>
                    <!-- Admin Panel Dropdown -->
                    <li class="nav-item dropdown" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link dropdown-toggle" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-gear-fill me-1"></i> Admin Tools
                        </a>
                        <ul class="dropdown-menu dropdown-menu-dark" aria-labelledby="adminDropdown">
                            <li><a class="dropdown-item" th:href="@{/admin/logs}"><i class="bi bi-terminal me-2"></i> System Logs</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/pipeline}"><i class="bi bi-git me-2"></i> CI/CD Pipeline</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/metrics}"><i class="bi bi-bar-chart me-2"></i> Performance Metrics</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/kubernetes}"><i class="bi bi-diagram-3 me-2"></i> Kubernetes Topology</a></li>
                        </ul>
                    </li>
                </ul>
                
                <!-- Right Side Actions: Notifications & User Dropdown -->
                <div class="d-flex align-items-center gap-3 ms-auto">
                    <!-- Notifications Icon -->
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/notifications}" class="text-secondary position-relative me-3" title="Notifications">
                        <i class="bi bi-bell-fill fs-5"></i>
                        <span th:if="${unreadNotificationCount > 0}" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65rem;" th:text="${unreadNotificationCount}">0</span>
                    </a>
                    
                    <!-- User Profile Dropdown -->
                    <div class="dropdown" sec:authorize="isAuthenticated()">
                        <button class="btn btn-outline-custom btn-sm dropdown-toggle active d-flex align-items-center gap-2 px-3 py-2" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-person-circle fs-6 text-primary"></i>
                            <span class="text-white fw-semibold" sec:authentication="name">User</span>
                            <span class="badge badge-admin text-uppercase" style="font-size: 0.65rem; padding: 0.25em 0.5em;" sec:authorize="hasRole('ADMIN')">Admin</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark p-2" aria-labelledby="userDropdown" style="min-width: 200px;">
                            <li>
                                <div class="px-3 py-2 text-secondary small">Signed in as <strong class="text-white" sec:authentication="name">user</strong></div>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item d-flex align-items-center gap-2" th:href="@{/profile}">
                                    <i class="bi bi-person me-2"></i> My Profile
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post" class="d-block w-100 m-0">
                                    <button type="submit" class="dropdown-item d-flex align-items-center gap-2 text-danger w-100 border-0 bg-transparent text-start">
                                        <i class="bi bi-box-arrow-right me-2"></i> Logout
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="glass-card p-5">
                    <div class="mb-4">
                        <h2 class="fw-bold"><i class="bi bi-key text-primary me-2"></i>Change Password</h2>
                        <p class="text-secondary">Security credentials update</p>
                    </div>

                    <!-- Alerts -->
                    <div th:if="${error}" class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger rounded-3 mb-4" role="alert" th:text="${error}">
                        An error occurred.
                    </div>

                    <form th:action="@{/profile/change-password}" method="post">
                        <div class="mb-3">
                            <label for="oldPassword" class="form-label text-secondary fw-semibold">Current Password</label>
                            <input type="password" id="oldPassword" name="oldPassword" class="form-control form-control-custom" placeholder="••••••••" required>
                        </div>

                        <div class="mb-4">
                            <label for="newPassword" class="form-label text-secondary fw-semibold">New Password</label>
                            <input type="password" id="newPassword" name="newPassword" class="form-control form-control-custom" placeholder="••••••••" required>
                        </div>

                        <div class="d-flex gap-3 justify-content-end">
                            <a th:href="@{/profile}" class="btn btn-outline-custom">Cancel</a>
                            <button type="submit" class="btn btn-primary-custom">Update Password</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}" src="/js/main.js"></script>
</body>
</html>
