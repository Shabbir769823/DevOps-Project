<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Task - DevOps Employee Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3 mb-5">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" th:href="@{/dashboard}">
                <i class="bi bi-cpu text-primary fs-3 me-2"></i>
                <span class="fw-bold">DevOps<span>Portal</span></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-1"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/employees}"><i class="bi bi-people me-1"></i> Employees</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/tasks}"><i class="bi bi-card-checklist me-1"></i> Tasks</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/profile}"><i class="bi bi-person-circle me-1"></i> Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/chat}"><i class="bi bi-chat-dots me-1"></i> Messages <span id="chat-badge" class="badge bg-danger rounded-pill d-none">0</span></a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/notifications}">
                            <i class="bi bi-bell-fill me-1"></i> Notifications 
                            <span th:if="${unreadNotificationCount > 0}" class="badge bg-danger rounded-pill" th:text="${unreadNotificationCount}">0</span>
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center text-secondary">
                    <span class="me-3" sec:authorize="isAuthenticated()">
                        Welcome, <strong class="text-white" sec:authentication="name">User</strong>
                        <span class="badge badge-admin ms-1" sec:authorize="hasRole('ADMIN')">Admin</span>
                        <span class="badge badge-user ms-1" sec:authorize="!hasRole('ADMIN')">User</span>
                    </span>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline-custom btn-sm"><i class="bi bi-box-arrow-right me-1"></i> Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <!-- Back Link -->
                <div class="mb-4">
                    <a th:href="@{/tasks}" class="text-secondary text-decoration-none d-inline-flex align-items-center">
                        <i class="bi bi-arrow-left me-1"></i> Back to Task Board
                    </a>
                </div>

                <!-- Form Card -->
                <div class="glass-card p-5">
                    <h2 class="fw-bold mb-1"><i class="bi bi-clipboard-plus text-primary me-2"></i>Assign New Task</h2>
                    <p class="text-secondary mb-5">Create a task assignment and allocate it to an employee user.</p>

                    <!-- Alert error -->
                    <div th:if="${error}" class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger rounded-3 mb-4" role="alert" th:text="${error}">
                        An error occurred.
                    </div>

                    <form th:action="@{/tasks/save}" th:object="${task}" method="post">
                        <!-- Title -->
                        <div class="mb-4">
                            <label for="title" class="form-label text-secondary fw-semibold">Task Title</label>
                            <input type="text" th:field="*{title}" id="title" class="form-control form-control-custom" placeholder="e.g. Deploy Kubernetes Service" required>
                        </div>

                        <!-- Description -->
                        <div class="mb-4">
                            <label for="description" class="form-label text-secondary fw-semibold">Task Description / Instructions</label>
                            <textarea th:field="*{description}" id="description" class="form-control form-control-custom" rows="5" placeholder="Provide detailed steps or descriptions of the work..." required></textarea>
                        </div>

                        <!-- Assignee -->
                        <div class="mb-5">
                            <label for="assigneeId" class="form-label text-secondary fw-semibold">Assignee (Employee Account)</label>
                            <select name="assigneeId" id="assigneeId" class="form-select form-control-custom" required>
                                <option value="" disabled selected>-- Select Employee User --</option>
                                <option th:each="u : ${assignees}" th:value="${u.id}" th:text="${u.firstName + ' ' + u.lastName + ' (' + u.username + ')'}"></option>
                            </select>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex justify-content-end gap-3">
                            <a th:href="@{/tasks}" class="btn btn-outline-custom">Cancel</a>
                            <button type="submit" class="btn btn-primary-custom px-4">Assign Task</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}" src="/js/main.js"></script>
</body>
</html>
