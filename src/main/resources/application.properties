# Server Configuration
server.port=8080

# Database Configuration with environment variable support for Kubernetes deployments
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:devops_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Spring Boot Actuator Configuration for Monitoring
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Enable Prometheus Metrics Export
management.metrics.export.prometheus.enabled=true
management.endpoint.prometheus.enabled=true
