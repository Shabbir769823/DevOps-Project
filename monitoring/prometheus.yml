global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape Spring Boot Actuator
  - job_name: 'spring-boot-actuator'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:8080', 'app:8080', 'employee-app-service.default.svc.cluster.local:8080']
