version: '3.8'

services:
  # MySQL Database Service (Custom image built locally)
  db:
    build:
      context: .
      dockerfile: db.Dockerfile
    container_name: devops-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devops_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - devops-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Application Service (Custom image built locally)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=devops_db
      - DB_USER=root
      - DB_PASSWORD=root
    depends_on:
      db:
        condition: service_healthy
    networks:
      - devops-network

  # Prometheus Service (Custom image built locally)
  prometheus:
    build:
      context: .
      dockerfile: prometheus.Dockerfile
    container_name: devops-prometheus
    ports:
      - "9090:9090"
    depends_on:
      - app
    networks:
      - devops-network

  # Grafana Service (Taken from Docker Hub)
  grafana:
    image: grafana/grafana:latest
    container_name: devops-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - devops-network

  # Adminer Service (Taken from Docker Hub)
  adminer:
    image: adminer:latest
    container_name: devops-adminer
    ports:
      - "8085:8080"
    depends_on:
      - db
    networks:
      - devops-network

volumes:
  mysql-data:

networks:
  devops-network:
    driver: bridge
